version: "3.9"

services:
  # ── C++ DAG Engine (Python FastAPI wraps the engine) ──────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: autoflow-api
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Frontend (Nginx static) ───────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: autoflow-ui
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: autoflow-net
